<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nuestra Boda — Erick & Esther</title>

  <style>
    :root{
      --txt:#4a4a4a;
      --muted:#7a7a7a;
      --accent:#a8b6ff;
      --bg:#fbfbfd;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--txt);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .cover{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px 18px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(1100px 600px at 20% 15%, rgba(168,182,255,.18), transparent 60%),
        radial-gradient(900px 550px at 80% 85%, rgba(242,168,198,.18), transparent 60%),
        var(--bg);
    }

    .ring-btn{
      cursor:pointer;
      width:200px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      animation:pulse 2.5s infinite ease-in-out;
    }
    @keyframes pulse{
      0%,100%{ transform:scale(1); filter:drop-shadow(0 0 6px rgba(143,170,255,.6)); }
      50%{ transform:scale(1.06); filter:drop-shadow(0 0 18px rgba(143,170,255,.9)); }
    }

    .title{
      font-family:"Playfair Display","Georgia",serif;
      font-size:2.25rem;
      margin:18px 0 6px;
      color:#6b6b6b;
    }
    .hint{
      margin:0;
      font-size:1rem;
      letter-spacing:.2px;
      color:#8a8a8a;
    }

    .sound-help{
      margin-top:18px;
      font-size:.92rem;
      color:#666;
      opacity:.95;
      max-width:520px;
      line-height:1.5;
    }
    .sound-help button{
      margin-top:10px;
      border:1px solid #ddd;
      background:#fff;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
    }

    .mini{
      margin-top:14px;
      font-size:.9rem;
      color:#777;
    }
    .mini a{
      color:#1f4fa3;
      text-decoration:none;
      border-bottom:1px solid rgba(31,79,163,.25);
    }
    .mini a:hover{ border-bottom-color:rgba(31,79,163,.6); }

    @media (prefers-reduced-motion: reduce){
      .ring-btn{ animation:none; }
    }
  </style>
</head>

<body>

  <!-- AUDIO (nota: en móviles puede bloquearse hasta primer toque) -->
  <audio id="marchaNupcial" autoplay loop>
    <source src="marcha_nupcial.mp3" type="audio/mpeg">
  </audio>

  <audio id="audioClick">
    <source src="unmundodiferente.mp3" type="audio/mpeg">
  </audio>

  <section class="cover" id="portada">

    <!-- ANILLO 2D Plateado + Diamante Azul -->
    <svg class="ring-btn" viewBox="0 0 200 200" role="button" aria-label="Abrir invitación" onclick="ringGo()">
      <defs>
        <linearGradient id="silverGlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="45%" stop-color="#e6e6e6"/>
          <stop offset="70%" stop-color="#bfbfbf"/>
          <stop offset="100%" stop-color="#f7f7f7"/>
        </linearGradient>

        <radialGradient id="blueDiamond">
          <stop offset="0%" stop-color="#eef5ff"/>
          <stop offset="65%" stop-color="#79aaff"/>
          <stop offset="100%" stop-color="#1f43b8"/>
        </radialGradient>

        <filter id="sparkle" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Aro -->
      <circle cx="100" cy="118" r="55" fill="none" stroke="url(#silverGlow)" stroke-width="14"/>

      <!-- Diamante -->
      <polygon points="100,22 132,56 100,92 68,56"
        fill="url(#blueDiamond)"
        style="filter: drop-shadow(0 0 10px rgba(122,162,255,.95));"
      />

      <!-- Destellos animados -->
      <g filter="url(#sparkle)">
        <path d="M100 6 L103 16 L113 19 L103 22 L100 32 L97 22 L87 19 L97 16 Z" fill="#ffffff" opacity="0.9">
          <animate attributeName="opacity" values="0.1;0.95;0.2" dur="1.8s" repeatCount="indefinite"/>
        </path>
        <path d="M155 45 L157 52 L164 54 L157 56 L155 63 L153 56 L146 54 L153 52 Z" fill="#ffffff" opacity="0.85">
          <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.2s" repeatCount="indefinite"/>
        </path>
      </g>
    </svg>

    <h1 class="title">¡Sí, acepto!</h1>
    <p class="hint">Da clic en el anillo para abrir</p>

    <div class="sound-help">
      Si no escuchas música (por configuración del teléfono), toca aquí:
      <div>
        <button type="button" onclick="forcePlayMarcha()">Activar sonido</button>
      </div>
    </div>

    <div class="mini">
      O abre directo la invitación aquí:
      <a href="https://bodaerick.my.canva.site/nuestraboda#inicio">bodaerick.my.canva.site/nuestraboda</a>
    </div>
  </section>

  <script>
    const CANVA_URL = "https://bodaerick.my.canva.site/nuestraboda#inicio";
    const marcha = document.getElementById("marchaNupcial");
    const clickAudio = document.getElementById("audioClick");

    // Intenta autoplay (puede fallar en móviles)
    document.addEventListener("DOMContentLoaded", async () => {
      try { await marcha?.play(); } catch(e) {}
    });

    async function forcePlayMarcha(){
      try { await marcha?.play(); } catch(e) {}
    }

    // Click del anillo:
    // 1) pausa marcha
    // 2) reproduce unmundodiferente.mp3
    // 3) abre Canva (tu sitio real)
    async function ringGo(){
      try { marcha?.pause(); } catch(e) {}
      try { await clickAudio?.play(); } catch(e) {}

      // pequeña espera para que alcance a "arrancar" el audio en algunos navegadores
      setTimeout(() => {
        window.location.href = CANVA_URL;
      }, 250);
    }
  </script>
</body>
</html>
